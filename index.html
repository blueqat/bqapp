<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KFNR4KHBZQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KFNR4KHBZQ');
    </script>
    <title>blueqat App | ゲームとアプリのポータル</title>
    <meta name="description" content="量子コンピューティングを遊びながら学べる！量子ゲームとプログラミングアプリのポータルサイト。">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
        .game-card:hover { transform: translateY(-4px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tab-active { color: #01875f; border-bottom: 3px solid #01875f; }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white text-gray-900">
    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <h1 id="logo" class="text-2xl font-bold text-gray-700 tracking-tight cursor-pointer" onclick="showHome()">
                    <span class="text-blue-600">blueqat</span> App
                </h1>
                <div id="search-bar" class="hidden flex-1 max-w-md mx-4">
                    <div class="relative">
                        <input type="text" id="search-input" placeholder="検索..." class="w-full bg-gray-100 border-none rounded-lg py-2 pl-10 pr-4 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        <i class="fas fa-search absolute left-3 top-2.5 text-gray-400 text-sm"></i>
                        <button onclick="toggleSearch()" class="absolute right-3 top-2 text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
                    </div>
                </div>
                <div id="header-icons" class="flex items-center gap-5 text-gray-500 text-lg">
                    <i class="fas fa-search cursor-pointer hover:text-blue-600" onclick="toggleSearch()"></i>
                    <i class="fas fa-user-circle cursor-pointer hover:text-blue-600"></i>
                </div>
            </div>
            <div class="flex gap-8 text-sm font-medium text-gray-500 overflow-x-auto no-scrollbar">
                <button id="tab-all" onclick="filterType('all')" class="pb-2 px-1 tab-active whitespace-nowrap">すべて</button>
                <button id="tab-game" onclick="filterType('game')" class="pb-2 px-1 hover:text-gray-900 whitespace-nowrap">ゲーム</button>
                <button id="tab-app" onclick="filterType('app')" class="pb-2 px-1 hover:text-gray-900 whitespace-nowrap">アプリ</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <section id="home-section">
            <div id="category-container">
                </div>
            <div id="no-results" class="hidden py-20 text-center text-gray-500">
                <i class="fas fa-search fa-3x mb-4 opacity-20"></i>
                <p>該当するアプリが見つかりません</p>
            </div>
        </section>

        <section id="detail-section" class="hidden animate-in fade-in duration-300">
            <button onclick="showHome()" class="mb-8 text-gray-500 font-medium flex items-center gap-2 hover:text-blue-600 transition">
                <i class="fas fa-arrow-left"></i> 一覧に戻る
            </button>
            <div class="flex flex-col md:flex-row gap-10 items-start">
                <img id="detail-img" src="" class="w-32 h-32 md:w-48 md:h-48 rounded-[2.2rem] shadow-xl border border-gray-50 object-cover">
                <div class="flex-1">
                    <h2 id="detail-title" class="text-3xl md:text-4xl font-bold mb-0.5"></h2>
                    <p id="detail-company" class="text-[#01875f] font-bold text-lg mb-0.5"></p>
                    <p id="detail-category" class="text-gray-500 text-sm mb-6"></p>
                    <div class="flex gap-3 mb-10">
                        <a id="play-button" href="#" target="_blank" onclick="trackAppClick()" class="bg-[#01875f] text-white px-12 py-3 rounded-lg font-bold hover:bg-[#01704f] shadow-lg transition-all text-center">今すぐ遊ぶ</a>
                        <button onclick="shareGame()" class="p-3 border border-gray-200 rounded-full w-12 h-12 flex items-center justify-center hover:bg-gray-50 transition"><i class="fas fa-share-alt text-gray-500"></i></button>
                    </div>
                    <div class="border-t border-gray-100 pt-8">
                        <h3 class="font-bold text-lg mb-4 text-gray-900">このアプリについて</h3>
                        <p id="detail-desc" class="text-gray-600 leading-relaxed text-base whitespace-pre-wrap"></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="mt-24 py-12 border-t border-gray-100 bg-gray-50 text-center text-gray-500">
        <p class="text-gray-400 font-bold text-lg mb-2">blueqat App</p>
        <p class="text-xs tracking-widest">&copy; 2026 blueqat Inc.</p>
    </footer>

<script>
    let games = [];
    let currentFilter = 'all';
    let searchQuery = '';
    let currentSelectedApp = null;

    function getCacheBustingUrl(url) {
        if (!url) return "";
        return `${url}${url.includes('?') ? '&' : '?'}v=${new Date().getTime()}`;
    }

    async function loadData() {
        try {
            const response = await fetch(getCacheBustingUrl('games.json'));
            const data = await response.json();
            games = data.games;
            init();

            const params = new URLSearchParams(window.location.search);
            const appId = params.get('id');
            if (appId) {
                const targetApp = games.find(g => g.id == appId);
                if (targetApp) showDetail(targetApp, false);
            }
        } catch (error) {
            console.error("JSONの読み込みに失敗しました:", error);
        }
    }

    function init() {
        renderCategoryLists();
        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderCategoryLists();
        });

        window.onpopstate = (event) => {
            const params = new URLSearchParams(window.location.search);
            const appId = params.get('id');
            if (appId) {
                const targetApp = games.find(g => g.id == appId);
                if (targetApp) updateDetailUI(targetApp);
            } else {
                showHome();
            }
        };
    }

    function renderCategoryLists() {
        const container = document.getElementById('category-container');
        const noResults = document.getElementById('no-results');
        container.innerHTML = '';

        // フィルタリング
        let filtered = games.filter(g => {
            const matchesType = (currentFilter === 'all' || g.type === currentFilter);
            const matchesSearch = (g.title.toLowerCase().includes(searchQuery) || g.company.toLowerCase().includes(searchQuery));
            return matchesType && matchesSearch;
        });

        if (filtered.length === 0) {
            noResults.classList.remove('hidden');
            return;
        }
        noResults.classList.add('hidden');

        // カテゴリの定義（表示順）
        const categories = [
            { id: 'game', label: '量子ゲーム' },
            { id: 'app', label: 'ツール・アプリ' }
        ];

        // 検索中の場合はカテゴリ分けせず一括表示、そうでない場合はカテゴリ分け
        if (searchQuery) {
            renderSection(container, "検索結果", filtered);
        } else {
            categories.forEach(cat => {
                const catApps = filtered.filter(g => g.type === cat.id);
                if (catApps.length > 0) {
                    renderSection(container, cat.label, catApps);
                }
            });
        }
    }

    function renderSection(parent, title, items) {
        const section = document.createElement('div');
        section.className = "mb-12";
        
        const heading = document.createElement('h2');
        heading.className = "text-xl font-bold mb-6 flex items-center gap-2 text-gray-800";
        heading.innerHTML = `<span class="w-1.5 h-6 bg-blue-600 rounded-full"></span>${title}`;
        
        const grid = document.createElement('div');
        grid.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-x-6 gap-y-10";

        items.forEach(g => {
            const div = document.createElement('div');
            div.className = "cursor-pointer game-card group";
            div.onclick = () => showDetail(g);
            div.innerHTML = `
                <div class="aspect-square mb-3">
                    <img src="${getCacheBustingUrl(g.img)}" class="w-full h-full rounded-[1.8rem] object-cover shadow-sm border border-gray-50 group-hover:shadow-md transition">
                </div>
                <div class="px-1">
                    <h3 class="text-sm font-bold truncate text-gray-800">${g.title}</h3>
                    <p class="text-[11px] text-[#01875f] font-bold">${g.company}</p>
                    <p class="text-[11px] text-gray-400">${g.category}</p>
                </div>`;
            grid.appendChild(div);
        });

        section.appendChild(heading);
        section.appendChild(grid);
        parent.appendChild(section);
    }

    function showDetail(data, pushHistory = true) {
        currentSelectedApp = data;
        if (pushHistory) {
            const newUrl = window.location.pathname + `?id=${data.id}`;
            window.history.pushState({ id: data.id }, '', newUrl);
        }
        updateDetailUI(data);
    }

    function updateDetailUI(data) {
        document.getElementById('detail-title').innerText = data.title;
        document.getElementById('detail-company').innerText = data.company;
        document.getElementById('detail-category').innerText = data.category;
        document.getElementById('detail-desc').innerText = data.desc;
        document.getElementById('detail-img').src = getCacheBustingUrl(data.img);
        document.getElementById('play-button').href = data.url;
        document.getElementById('home-section').classList.add('hidden');
        document.getElementById('detail-section').classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    function showHome() {
        const cleanUrl = window.location.pathname;
        window.history.pushState({}, '', cleanUrl);
        document.getElementById('home-section').classList.remove('hidden');
        document.getElementById('detail-section').classList.add('hidden');
        window.scrollTo(0, 0);
    }

    function toggleSearch() {
        const bar = document.getElementById('search-bar');
        const logo = document.getElementById('logo');
        const icons = document.getElementById('header-icons');
        const input = document.getElementById('search-input');
        if (bar.classList.contains('hidden')) {
            bar.classList.remove('hidden'); logo.classList.add('hidden'); icons.classList.add('hidden'); input.focus();
        } else {
            bar.classList.add('hidden'); logo.classList.remove('hidden'); icons.classList.remove('hidden'); input.value = ''; searchQuery = '';
            renderCategoryLists();
        }
    }

    function filterType(type) {
        currentFilter = type;
        ['all', 'game', 'app'].forEach(t => document.getElementById(`tab-${t}`).classList.remove('tab-active'));
        document.getElementById(`tab-${type}`).classList.add('tab-active');
        renderCategoryLists();
    }

    function shareGame() {
        if (!currentSelectedApp) return;
        const shareUrl = window.location.origin + window.location.pathname + `?id=${currentSelectedApp.id}`;
        if (navigator.share) { 
            navigator.share({ title: `blueqat App | ${currentSelectedApp.title}`, url: shareUrl }); 
        } else { 
            navigator.clipboard.writeText(shareUrl); alert("リンクをコピーしました！"); 
        }
    }

    loadData();
</script>
</body>
</html>
